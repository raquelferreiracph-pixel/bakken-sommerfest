<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakken 5-kamp — Summer Party 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #E8E2D4; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
.wrap { background: #F5F0E8; border-radius: 20px; max-width: 560px; width: 100%; overflow: hidden; box-shadow: 0 4px 32px rgba(0,0,0,0.10); }
.hero { background: #F5F0E8; padding: 2rem 2rem 0; text-align: center; }
.hero-title { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900; color: #1a1a1a; margin-bottom: 0.2rem; }
.hero-sub { font-size: 11px; color: #999; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.75rem; }
.body { padding: 1.5rem 2rem 2rem; }
.section-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 1rem; font-weight: 500; }
.date-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 2rem; }
.vote-btn { background: white; border: 1.5px solid #ddd; border-radius: 10px; padding: 14px 8px; cursor: pointer; text-align: center; transition: all 0.18s; }
.vote-btn:hover { border-color: #1a1a1a; background: #eee8d8; }
.vote-btn.selected { border-color: #1a1a1a; background: #1a1a1a; color: white; }
.vote-btn .day { font-size: 24px; font-weight: 700; font-family: 'Playfair Display', serif; display: block; }
.vote-btn .month { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; display: block; }
.vote-btn .vc { font-size: 11px; margin-top: 6px; display: block; opacity: 0.6; }
.rest-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 2rem; }
.rest-btn { background: white; border: 1.5px solid #ddd; border-radius: 12px; padding: 16px; cursor: pointer; text-align: left; display: flex; align-items: flex-start; gap: 14px; transition: all 0.18s; }
.rest-btn:hover { border-color: #1a1a1a; background: #eee8d8; }
.rest-btn.selected { border-color: #C8A96E; background: #FBF5E6; }
.rest-icon { width: 44px; height: 44px; border-radius: 10px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 22px; }
.rest-name { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 3px; }
.rest-desc { font-size: 12px; color: #666; line-height: 1.5; }
.rest-tag { display: inline-block; font-size: 10px; background: #eee; color: #555; border-radius: 20px; padding: 2px 8px; margin-top: 5px; margin-right: 4px; }
.rest-tag.green { background: #e6f4e6; color: #2d7a2d; }
.rest-btn.selected .rest-name { color: #7A5C1E; }
.rest-btn.selected .rest-desc { color: #8a6a30; }
.rc { font-size: 11px; color: #aaa; margin-top: 6px; }
hr { border: none; border-top: 1px solid #ddd; margin: 1.5rem 0; }
.name-row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
.name-row input { flex: 1; border: 1.5px solid #ddd; border-radius: 10px; padding: 10px 14px; font-size: 14px; background: white; outline: none; font-family: 'Inter', sans-serif; }
.name-row input:focus { border-color: #1a1a1a; }
.submit-btn { width: 100%; background: #1a1a1a; color: #F5F0E8; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s; }
.submit-btn:hover { background: #333; }
.submit-btn:disabled { background: #999; cursor: default; }
.results { background: white; border-radius: 10px; padding: 1.25rem; margin-top: 1rem; border: 1.5px solid #eee; }
.bar-row { margin-bottom: 10px; }
.bar-label { font-size: 12px; color: #555; margin-bottom: 4px; display: flex; justify-content: space-between; }
.bar-bg { background: #eee; border-radius: 4px; height: 8px; }
.bar-fill { background: #1a1a1a; border-radius: 4px; height: 8px; transition: width 0.4s; }
.bar-fill.gold { background: #C8A96E; }
.thank { text-align: center; padding: 1rem 0 0; font-size: 14px; color: #555; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-title">Bakken 5-kamp</div>
    <div class="hero-sub">Summer Party 2026 — vote for date & restaurant</div>
    <svg viewBox="0 0 700 130" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">
      <rect width="700" height="130" fill="#F5F0E8"/>
      <rect x="0" y="115" width="700" height="15" fill="#1a1a1a"/>
      <polyline points="30,115 30,20 80,20 80,60 120,20 160,60 160,115" fill="none" stroke="#1a1a1a" stroke-width="4"/>
      <polyline points="30,115 55,60 80,20" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <polyline points="80,20 100,60 120,20" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <polyline points="120,20 140,60 160,20" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      <ellipse cx="15" cy="90" rx="14" ry="22" fill="#1a1a1a"/>
      <rect x="13" y="108" width="4" height="10" fill="#1a1a1a"/>
      <polygon points="270,115 270,50 320,20 370,50 370,115" fill="#1a1a1a"/>
      <polygon points="290,115 290,60 320,35 350,60 350,115" fill="#F5F0E8"/>
      <text x="320" y="90" font-family="serif" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">CIRKUSREVYEN</text>
      <circle cx="220" cy="75" r="12" fill="#1a1a1a"/>
      <rect x="213" y="87" width="14" height="28" fill="#1a1a1a" rx="4"/>
      <circle cx="255" cy="72" r="11" fill="#1a1a1a"/>
      <rect x="248" y="83" width="14" height="30" fill="#1a1a1a" rx="4"/>
      <circle cx="460" cy="72" r="42" fill="none" stroke="#1a1a1a" stroke-width="4"/>
      <circle cx="460" cy="72" r="6" fill="#1a1a1a"/>
      <line x1="460" y1="30" x2="460" y2="114" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="418" y1="72" x2="502" y2="72" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="431" y1="43" x2="489" y2="101" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="431" y1="101" x2="489" y2="43" stroke="#1a1a1a" stroke-width="2"/>
      <rect x="456" y="24" width="8" height="10" fill="#1a1a1a" rx="2"/>
      <rect x="493" y="68" width="8" height="10" fill="#1a1a1a" rx="2"/>
      <rect x="456" y="110" width="8" height="10" fill="#1a1a1a" rx="2"/>
      <rect x="419" y="68" width="8" height="10" fill="#1a1a1a" rx="2"/>
      <rect x="453" y="115" width="14" height="5" fill="#1a1a1a"/>
      <rect x="540" y="75" width="60" height="40" fill="#1a1a1a" rx="2"/>
      <polygon points="540,75 570,50 600,75" fill="#1a1a1a"/>
      <rect x="553" y="90" width="12" height="25" fill="#F5F0E8" rx="1"/>
      <rect x="575" y="88" width="14" height="12" fill="#F5F0E8" rx="1"/>
      <ellipse cx="650" cy="80" rx="12" ry="15" fill="#1a1a1a"/>
      <rect x="638" y="90" width="24" height="12" fill="#1a1a1a"/>
      <ellipse cx="643" cy="102" rx="5" ry="5" fill="#F5F0E8"/>
      <ellipse cx="657" cy="102" rx="5" ry="5" fill="#F5F0E8"/>
      <ellipse cx="685" cy="88" rx="13" ry="20" fill="#1a1a1a"/>
      <rect x="683" y="105" width="4" height="12" fill="#1a1a1a"/>
    </svg>
  </div>

  <div class="body">
    <div class="section-label">Which date works for you?</div>
    <div class="date-grid" id="date-grid">
      <button class="vote-btn" data-date="14" onclick="voteDate(this,'14')">
        <span class="day">14</span><span class="month">August</span><span class="vc" id="dc-14">0 votes</span>
      </button>
      <button class="vote-btn" data-date="21" onclick="voteDate(this,'21')">
        <span class="day">21</span><span class="month">August</span><span class="vc" id="dc-21">0 votes</span>
      </button>
      <button class="vote-btn" data-date="28" onclick="voteDate(this,'28')">
        <span class="day">28</span><span class="month">August</span><span class="vc" id="dc-28">0 votes</span>
      </button>
    </div>

    <hr>
    <div class="section-label">Which restaurant do you prefer?</div>
    <div class="rest-grid">
      <button class="rest-btn" onclick="voteRest(this,0)">
        <div class="rest-icon">🍕</div>
        <div style="flex:1">
          <div class="rest-name">Valentino</div>
          <div class="rest-desc">One of Bakken's oldest restaurants. Delicious pizza, pasta and à la carte dishes at great prices — generous portions and a lively atmosphere.</div>
          <span class="rest-tag">Pizza & pasta</span>
          <span class="rest-tag">À la carte</span>
          <span class="rest-tag green">Vegetarian options</span>
          <div class="rc" id="rc-0">0 votes</div>
        </div>
      </button>
      <button class="rest-btn" onclick="voteRest(this,1)">
        <div class="rest-icon">🌶️</div>
        <div style="flex:1">
          <div class="rest-name">Indian Bites</div>
          <div class="rest-desc">Authentic Indian food right at Bakken. Choose from spiced curries, tikka masala, freshly baked naan and much more.</div>
          <span class="rest-tag">Indian cuisine</span>
          <span class="rest-tag green">Vegan options</span>
          <span class="rest-tag green">Vegetarian options</span>
          <div class="rc" id="rc-1">0 votes</div>
        </div>
      </button>
    </div>

    <hr>
    <div class="section-label">Your name</div>
    <div class="name-row">
      <input type="text" id="voter-name" placeholder="Enter your name..." maxlength="40"/>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitVote()">Cast my vote</button>

    <div id="results-area" style="display:none;margin-top:1.5rem;">
      <div class="section-label">Results so far</div>
      <div class="results">
        <div style="font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:12px;">Date</div>
        <div class="bar-row"><div class="bar-label"><span>14 August</span><span id="pct-14">0%</span></div><div class="bar-bg"><div class="bar-fill" id="bar-14" style="width:0%"></div></div></div>
        <div class="bar-row"><div class="bar-label"><span>21 August</span><span id="pct-21">0%</span></div><div class="bar-bg"><div class="bar-fill" id="bar-21" style="width:0%"></div></div></div>
        <div class="bar-row"><div class="bar-label"><span>28 August</span><span id="pct-28">0%</span></div><div class="bar-bg"><div class="bar-fill" id="bar-28" style="width:0%"></div></div></div>
        <div style="font-size:13px;font-weight:500;color:#1a1a1a;margin:16px 0 12px;">Restaurant</div>
        <div class="bar-row"><div class="bar-label"><span>Valentino</span><span id="pct-r0">0%</span></div><div class="bar-bg"><div class="bar-fill gold" id="bar-r0" style="width:0%"></div></div></div>
        <div class="bar-row"><div class="bar-label"><span>Indian Bites</span><span id="pct-r1">0%</span></div><div class="bar-bg"><div class="bar-fill gold" id="bar-r1" style="width:0%"></div></div></div>
      </div>
      <div class="thank" id="thank-msg" style="display:none;">Thanks for voting! 🎡</div>
    </div>
  </div>
</div>

<script>
const dateKeys=['14','21','28'];
let votes={dates:{'14':0,'21':0,'28':0},rests:[0,0]};
let myDate=null,myRest=null,hasVoted=false;
function voteDate(btn,d){
  if(hasVoted)return;
  document.querySelectorAll('#date-grid .vote-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  myDate=d;
}
function voteRest(btn,idx){
  if(hasVoted)return;
  document.querySelectorAll('.rest-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  myRest=idx;
}
function submitVote(){
  const name=document.getElementById('voter-name').value.trim();
  if(myDate===null){alert('Please select a date.');return;}
  if(myRest===null){alert('Please select a restaurant.');return;}
  if(!name){alert('Please enter your name.');return;}
  votes.dates[myDate]++;
  votes.rests[myRest]++;
  hasVoted=true;
  document.getElementById('submit-btn').disabled=true;
  document.getElementById('submit-btn').textContent='Thanks, '+name+'! ✓';
  document.getElementById('voter-name').disabled=true;
  updateCounts();updateBars();
  document.getElementById('results-area').style.display='block';
  document.getElementById('thank-msg').style.display='block';
}
function updateCounts(){
  dateKeys.forEach(d=>{
    const el=document.getElementById('dc-'+d);
    if(el)el.textContent=votes.dates[d]+(votes.dates[d]===1?' vote':' votes');
  });
  for(let i=0;i<2;i++){
    const el=document.getElementById('rc-'+i);
    if(el)el.textContent=votes.rests[i]+(votes.rests[i]===1?' vote':' votes');
  }
}
function updateBars(){
  const dt=dateKeys.reduce((s,d)=>s+votes.dates[d],0);
  dateKeys.forEach(d=>{
    const p=dt?Math.round(votes.dates[d]/dt*100):0;
    document.getElementById('bar-'+d).style.width=p+'%';
    document.getElementById('pct-'+d).textContent=p+'%';
  });
  const rt=votes.rests.reduce((s,v)=>s+v,0);
  for(let i=0;i<2;i++){
    const p=rt?Math.round(votes.rests[i]/rt*100):0;
    document.getElementById('bar-r'+i).style.width=p+'%';
    document.getElementById('pct-r'+i).textContent=p+'%';
  }
}
</script>
</body>
</html>
